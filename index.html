<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .game-title {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border-radius: 15px;
            color: white;
        }

        .score-item {
            font-size: 1.5em;
            font-weight: bold;
        }

        .score-number {
            font-size: 2.5em;
            display: block;
            margin-top: 5px;
        }

        .choices {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            gap: 15px;
        }

        .choice-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2em;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .choice-btn:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        .choice-btn:active {
            transform: translateY(0) scale(1);
        }

        .result-container {
            margin: 20px 0;
            min-height: 100px;
        }

        .result {
            font-size: 1.8em;
            font-weight: bold;
            margin: 15px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .result.show {
            opacity: 1;
            transform: translateY(0);
        }

        .win { color: #4ecdc4; }
        .lose { color: #ff6b6b; }
        .tie { color: #f39c12; }

        .hands-display {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            font-size: 3em;
        }

        .reset-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            margin-top: 20px;
        }

        .reset-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
        }

        @media (max-width: 480px) {
            .game-title { font-size: 2em; }
            .game-icon { font-size: 3em; }
            .choices { flex-wrap: wrap; }
            .choice-btn { width: 70px; height: 70px; font-size: 1.8em; }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-title">🪨📄✂️ Rock Paper Scissors</div>
        <div class="game-icon">🎮</div>
        
        <div class="scoreboard">
            <div class="score-item">
                <span>You</span>
                <div class="score-number" id="playerScore">0</div>
            </div>
            <div class="score-item">
                <span>AI</span>
                <div class="score-number" id="computerScore">0</div>
            </div>
        </div>

        <div class="hands-display">
            <span id="playerHand">✋</span>
            <span>VS</span>
            <span id="computerHand">✋</span>
        </div>

        <div class="choices">
            <button class="choice-btn" id="rock">🪨</button>
            <button class="choice-btn" id="paper">📄</button>
            <button class="choice-btn" id="scissors">✂️</button>
        </div>

        <div class="result-container">
            <div class="result" id="result"></div>
        </div>

        <button class="reset-btn" id="resetBtn">🔄 Reset Game</button>
    </div>

    <script>
        // Game state
        let playerScore = 0;
        let computerScore = 0;
        const choices = ['🪨', '📄', '✂️'];
        const choiceNames = ['rock', 'paper', 'scissors'];

        // DOM elements
        const playerHand = document.getElementById('playerHand');
        const computerHand = document.getElementById('computerHand');
        const result = document.getElementById('result');
        const playerScoreEl = document.getElementById('playerScore');
        const computerScoreEl = document.getElementById('computerScore');
        const resetBtn = document.getElementById('resetBtn');

        // Choice buttons
        const rockBtn = document.getElementById('rock');
        const paperBtn = document.getElementById('paper');
        const scissorsBtn = document.getElementById('scissors');

        // Random AI choice
        function getComputerChoice() {
            const randomIndex = Math.floor(Math.random() * 3);
            return choices[randomIndex];
        }

        // Determine winner
        function determineWinner(playerChoice, computerChoice) {
            if (playerChoice === computerChoice) {
                return 'tie';
            }
            
            const playerIndex = choiceNames.indexOf(
                choiceNames[choices.indexOf(playerChoice)]
            );
            const computerIndex = choiceNames.indexOf(
                choiceNames[choices.indexOf(computerChoice)]
            );

            if (
                (playerIndex === 0 && computerIndex === 2) || // rock beats scissors
                (playerIndex === 1 && computerIndex === 0) || // paper beats rock
                (playerIndex === 2 && computerIndex === 1)    // scissors beats paper
            ) {
                return 'win';
            }
            return 'lose';
        }

        // Play round
        function playRound(playerChoice) {
            const computerChoice = getComputerChoice();
            
            // Visual feedback - show hands
            playerHand.textContent = playerChoice;
            computerHand.textContent = computerChoice;

            // Determine result
            const outcome = determineWinner(playerChoice, computerChoice);
            
            // Update result with animation
            result.textContent = getResultMessage(outcome, playerChoice, computerChoice);
            result.className = `result show ${outcome}`;

            // Update scores
            if (outcome === 'win') {
                playerScore++;
            } else if (outcome === 'lose') {
                computerScore++;
            }

            updateScoreboard();
        }

        // Result messages
        function getResultMessage(outcome, playerChoice, computerChoice) {
            if (outcome === 'win') {
                return `🎉 You Win! ${playerChoice} beats ${computerChoice}`;
            } else if (outcome === 'lose') {
                return `😞 You Lose! ${computerChoice} beats ${playerChoice}`;
            } else {
                return `🤝 It's a Tie! Both chose ${playerChoice}`;
            }
        }

        // Update scoreboard
        function updateScoreboard() {
            playerScoreEl.textContent = playerScore;
            computerScoreEl.textContent = computerScore;
        }

        // Reset game
        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            playerHand.textContent = '✋';
            computerHand.textContent = '✋';
            result.className = 'result';
            result.textContent = '';
            updateScoreboard();
        }

        // Event listeners
        rockBtn.addEventListener('click', () => playRound('🪨'));
        paperBtn.addEventListener('click', () => playRound('📄'));
        scissorsBtn.addEventListener('click', () => playRound('✂️'));
        resetBtn.addEventListener('click', resetGame);

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'r': playRound('🪨'); break;
                case 'p': playRound('📄'); break;
                case 's': playRound('✂️'); break;
            }
        });
    </script>
</body>
</html>
